name: Deploy Min

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: cellardooor/blank
  TF_ROOT: terraform/envs/min

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[dev]') }}
    outputs:
      image_sha_full: ${{ steps.sha.outputs.sha_tag_full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get SHA tag
        id: sha
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          SHA_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${REGISTRY}/${IMAGE_NAME}:${SHA_TAG}"
          LATEST_IMAGE="${REGISTRY}/${IMAGE_NAME}:latest"

          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag_full=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag_latest=${LATEST_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.sha.outputs.sha_tag_full }}
            ${{ steps.sha.outputs.sha_tag_latest }}

  deploy-min:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"https://storage.yandexcloud.net\"}" \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=ru-central1" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="access_key=${{ secrets.YC_S3_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.YC_S3_SECRET_KEY }}" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true"

      - name: Terraform Apply
        working-directory: ${{ env.TF_ROOT }}
        env:
          TF_VAR_yc_token: ${{ secrets.YC_TOKEN }}
          TF_VAR_yc_cloud_id: ${{ vars.YC_CLOUD_ID }}
          TF_VAR_yc_folder_id: ${{ vars.YC_FOLDER_ID }}
          TF_VAR_docker_image: ${{ needs.build.outputs.image_sha_full }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_encryption_key: ${{ secrets.ENCRYPTION_KEY }}
          TF_VAR_jwt_duration: ${{ vars.JWT_DURATION }}
          TF_VAR_db_user: ${{ vars.DB_USER }}
          TF_VAR_db_name: ${{ vars.DB_NAME }}
          TF_VAR_default_user: ${{ secrets.DEFAULT_USER }}
          TF_VAR_default_password: ${{ secrets.DEFAULT_PASSWORD }}
          TF_VAR_domain: ${{ vars.DOMAIN }}
        run: |
          terraform apply -auto-approve -input=false

      - name: Deployment Summary
        working-directory: ${{ env.TF_ROOT }}
        run: |
          echo "========================================="
          echo "Min Deployment Complete!"
          echo "========================================="
          echo ""
          echo "VM IP: $(terraform output -raw vm_ip)"
          echo "Domain: https://$(terraform output -raw domain)"
          echo "Docker Image: ${{ needs.build.outputs.image_sha_full }}"
          echo "========================================="
