<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{csrf_token}}">
    <title>Blank</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loading-screen" class="hidden"></div>
    <div id="app">
        <!-- Authentication Section -->
        <div id="auth-section">
            <div id="auth-card">
                <input type="text" id="username" placeholder="Username" autocomplete="off" maxlength="16">
                <input type="password" id="password" placeholder="Password" minlength="5" required>
                <button onclick="login()" class="btn-primary">Login</button>
                <button onclick="register()" class="btn-secondary">Create Account</button>
                <div id="auth-error"></div>
            </div>
        </div>

        <!-- Chat Section - Two Panel Layout -->
        <div id="chat-section" class="hidden">
            <!-- Left Sidebar - Chat List -->
            <div id="sidebar">
                <div id="sidebar-header">
                    <img src="/favicon.ico" id="logo-icon" alt="Logo">
                    <button onclick="showNewChatModal()" id="new-chat-btn">New Chat</button>
                </div>
                <div id="contacts-list">
                    <div id="empty-state-container" class="hidden">
                        <p style="color: #666666; margin-bottom: 16px;">No chats yet</p>
                        <button onclick="showNewChatModal()" class="btn-secondary" style="width: auto;">Start New Chat</button>
                    </div>
                </div>
                <div id="sidebar-footer">
                    <span id="current-user">User</span>
                    <div id="footer-buttons">
                        <button onclick="showChangePasswordModal()" id="change-pwd-btn">Change Password</button>
                        <button onclick="logout()" id="logout-btn">Logout</button>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Chat Window -->
            <div id="chat-window">
                <!-- Empty State -->
                <div id="empty-state">
                </div>

                <!-- Active Chat -->
                <div id="active-chat" class="hidden">
                    <div id="chat-header">
                        <button id="back-btn" onclick="goToSidebar()">←</button>
                        <div id="chat-info">
                            <div id="chat-username"></div>
                            <div id="chat-status"></div>
                        </div>
                        <div id="call-controls">
                            <button id="audio-call-btn" onclick="startAudioCall()" title="Audio Call">📞</button>
                            <button id="video-call-btn" onclick="startVideoCall()" title="Video Call">📹</button>
                        </div>
                    </div>
                    <div id="messages-container">
                        <div id="messages"></div>
                    </div>
                    <div id="input-area">
                        <textarea id="message-input" name="chatMsg" placeholder="Type a message..." rows="1" maxlength="65536" autocomplete="off" autocorrect="on" autocapitalize="sentences" spellcheck="true" enterkeyhint="enter" data-form-type="other" aria-autocomplete="none" role="textbox" inputmode="text"></textarea>
                        <button onclick="sendMessage()" id="send-btn">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Chat Modal -->
    <div id="new-chat-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Chat</h3>
            </div>
            <div class="modal-body">
                <label for="new-chat-username" class="input-label">Username</label>
                <div class="search-container">
                    <input type="text" id="new-chat-username" name="username" placeholder="Enter username" autocomplete="search" autocapitalize="none" autocorrect="off">
                    <div id="user-search-results" class="dropdown hidden"></div>
                </div>
                <div id="new-chat-error" class="error-message"></div>
            </div>
            <div class="modal-footer">
                <button onclick="createChatByUsername()" class="btn-secondary">Create Chat</button>
                <button onclick="closeNewChatModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="change-password-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Change Password</h3>
            </div>
            <div class="modal-body">
                <label for="old-password" class="input-label">Current Password</label>
<input type="password" id="old-password" placeholder="Enter current password" autocomplete="off">
                <label for="new-password" class="input-label">New Password</label>
                <input type="password" id="new-password" placeholder="Enter new password (min 5 characters)" autocomplete="off" minlength="5" required>
                <label for="confirm-password" class="input-label">Confirm New Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm new password" autocomplete="off" minlength="5" required>
                <div id="change-password-error" class="error-message"></div>
                <div id="change-password-success" class="success-message"></div>
            </div>
            <div class="modal-footer">
                <button onclick="changePassword()" class="btn-secondary">Change</button>
                <button onclick="closeChangePasswordModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Call Modal -->
    <div id="call-modal" class="modal">
        <div class="modal-content call-modal-content">
            <div class="modal-header">
                <h3 id="call-header-title">Incoming Call</h3>
                <button onclick="endCall()" class="btn-secondary" id="end-call-btn">End</button>
            </div>
            <div class="modal-body call-modal-body">
                <div id="call-participant-info">
                    <div id="call-participant-avatar"></div>
                    <div id="call-participant-name"></div>
                </div>
                <div id="call-timer">00:00</div>
                <div id="call-actions">
                    <button onclick="toggleAudio()" id="mute-btn" title="Mute">🔇</button>
                    <button onclick="toggleVideo()" id="camera-btn" title="Camera">📹</button>
                    <button onclick="toggleScreenShare()" id="screen-btn" title="Screen Share">🖥️</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Call Invite Modal -->
    <div id="call-invite-modal" class="modal">
        <div class="modal-content call-modal-content">
            <div class="modal-header">
                <h3 id="invite-header-title">Incoming Call</h3>
            </div>
            <div class="modal-body call-modal-body">
                <div id="invite-participant-info">
                    <div id="invite-participant-avatar"></div>
                    <div id="invite-participant-name"></div>
                </div>
                <div id="invite-actions">
                    <button onclick="acceptCall()" class="btn-primary" id="accept-call-btn">Accept</button>
                    <button onclick="rejectCall()" class="btn-secondary" id="reject-call-btn">Reject</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/webrtc/peer-connection.js"></script>
    <script src="/webrtc/media-utils.js"></script>
    <script src="/webrtc/call-manager.js"></script>
    <script src="/app.js"></script>
</body>
</html>
